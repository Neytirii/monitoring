version: '3.9'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: monitoring-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: monitoring
      POSTGRES_PASSWORD: monitoring
      POSTGRES_DB: monitoring
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U monitoring']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: monitoring-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: monitoring-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://monitoring:monitoring@postgres:5432/monitoring
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_AGENT_SECRET: ${JWT_AGENT_SECRET:-change-me-agent-secret}
      PORT: 3000
      HOST: 0.0.0.0
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost}
      NODE_ENV: production
    expose:
      - '3000'

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    container_name: monitoring-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - '5173'

  caddy:
    image: caddy:2-alpine
    container_name: monitoring-caddy
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
