# Infrastructure only — use this for local development
# Backend and frontend run outside Docker with `npm run dev`
#
# Usage:
#   docker compose -f infra/docker-compose.infra.yml up -d

version: '3.9'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: monitoring-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: monitoring
      POSTGRES_PASSWORD: monitoring
      POSTGRES_DB: monitoring
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01_timescale.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U monitoring']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: monitoring-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
  redis_data:
